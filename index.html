<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Assets/css/style.css">
    <title>SHAN REPO</title>
</head>
<body>

<header>
    <div class="container flex-center">
        <h1>SHAN REPO</h1>
        
        <!-- Theme Switcher Settings Interface Component -->
        <div class="settings-container">
            <button id="settings-toggle" class="settings-btn" aria-label="Open Themes">⚙</button>
            <div id="theme-menu" class="theme-dropdown">
                <h3>Select Theme</h3>
                <button class="theme-opt active" data-theme="slate">Night Owl (Default)</button>
                <button class="theme-opt" data-theme="ocean">Emerald Ocean</button>
                <button class="theme-opt" data-theme="crimson">Crimson Rage</button>
                <button class="theme-opt" data-theme="cyber">Cyber Purple</button>
                <button class="theme-opt" data-theme="nord">Nordic Frost</button>
                <button class="theme-opt" data-theme="light">Classic Light Mode</button>
            </div>
        </div>
    </div>
    
    <div class="folderStructureList container flex-start" id="menu-root"></div>
</header>

    <script src="Assets/js/script.js"></script>
</body>
</html>
